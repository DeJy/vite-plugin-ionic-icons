<!-- Detected icons: arrow-back (static), checkmark-circle (via [name]) -->
<div>
  <!-- Static attribute -->
  <ion-icon name="arrow-back"></ion-icon>

  <!-- Property binding with string literal -->

  <!-- Dynamic variable — should NOT be detected -->
  <ion-icon [name]="iconName"></ion-icon>
</div>
